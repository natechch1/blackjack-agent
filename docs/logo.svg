<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff00aa" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <!-- Circuit pattern -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20h15M25 20h15M20 0v15M20 25v15" stroke="#00f0ff" stroke-width="0.5" opacity="0.08"/>
      <circle cx="20" cy="20" r="2" fill="#00f0ff" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg-grad)"/>
  <rect width="512" height="512" rx="64" fill="url(#circuit)"/>

  <!-- Outer hexagonal border glow -->
  <polygon points="256,32 452,120 452,392 256,480 60,392 60,120"
           fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"
           filter="url(#glow-purple)"/>

  <!-- Playing Card (Ace) — tilted slightly -->
  <g transform="translate(256,240) rotate(-8)">
    <!-- Card shadow -->
    <rect x="-72" y="-100" width="144" height="200" rx="10"
          fill="#000" opacity="0.4" transform="translate(4,4)"/>
    <!-- Card body -->
    <rect x="-72" y="-100" width="144" height="200" rx="10"
          fill="url(#card-grad)" stroke="#00f0ff" stroke-width="2"
          filter="url(#glow-cyan)"/>
    <!-- Card inner border -->
    <rect x="-62" y="-90" width="124" height="180" rx="6"
          fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

    <!-- "A" top-left -->
    <text x="-50" y="-62" font-family="'Courier New', monospace" font-size="28"
          font-weight="bold" fill="#00f0ff" filter="url(#glow-cyan)">A</text>

    <!-- Center spade suit — cyberpunk style -->
    <g transform="translate(0,-8)">
      <!-- Spade shape -->
      <path d="M0,-38 C-8,-30 -32,-10 -32,10 C-32,26 -20,36 -8,36 C-2,36 2,34 4,30
               L0,52 L0,52 L-8,52 C-10,52 -10,56 -8,56 L8,56 C10,56 10,52 8,52
               L0,52 L0,30 C-2,34 2,36 8,36 C20,36 32,26 32,10 C32,-10 8,-30 0,-38Z"
            fill="#ff00aa" filter="url(#glow-magenta)"/>
      <!-- Spade circuit overlay -->
      <circle cx="0" cy="8" r="12" fill="none" stroke="#ff00aa" stroke-width="1" opacity="0.5"/>
      <circle cx="0" cy="8" r="6" fill="none" stroke="#ff00aa" stroke-width="0.5" opacity="0.3"/>
      <line x1="-12" y1="8" x2="12" y2="8" stroke="#ff00aa" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="-4" x2="0" y2="20" stroke="#ff00aa" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- "A" bottom-right (inverted) -->
    <text x="26" y="88" font-family="'Courier New', monospace" font-size="28"
          font-weight="bold" fill="#00f0ff" transform="rotate(180, 38, 76)"
          filter="url(#glow-cyan)">A</text>
  </g>

  <!-- AI Brain Circuit — top right area -->
  <g transform="translate(340, 130)" filter="url(#glow-cyan)">
    <!-- Brain/chip outline -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="18" fill="rgba(0,240,255,0.05)" stroke="#00f0ff" stroke-width="0.8"/>
    <!-- Circuit traces radiating out -->
    <line x1="0" y1="-42" x2="0" y2="-56" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="42" y1="0" x2="56" y2="0" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="42" x2="0" y2="56" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="-42" y1="0" x2="-56" y2="0" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="30" y1="-30" x2="40" y2="-40" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="30" x2="40" y2="40" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-30" x2="-40" y2="-40" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="30" x2="-40" y2="40" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <!-- Node dots -->
    <circle cx="0" cy="-56" r="3" fill="#00f0ff"/>
    <circle cx="56" cy="0" r="3" fill="#00f0ff"/>
    <circle cx="0" cy="56" r="3" fill="#00f0ff"/>
    <circle cx="-56" cy="0" r="3" fill="#00f0ff"/>
    <!-- "AI" text -->
    <text x="0" y="6" font-family="'Courier New', monospace" font-size="18"
          font-weight="bold" fill="#00f0ff" text-anchor="middle">AI</text>
  </g>

  <!-- "21" badge — bottom left -->
  <g transform="translate(148, 370)">
    <rect x="-36" y="-22" width="72" height="44" rx="8"
          fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1.5"
          filter="url(#glow-purple)"/>
    <text x="0" y="8" font-family="'Courier New', monospace" font-size="30"
          font-weight="bold" fill="#8b5cf6" text-anchor="middle">21</text>
  </g>

  <!-- Scan lines overlay -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="512" y2="0" stroke="#00f0ff" stroke-width="1" transform="translate(0,4)" />
    <line x1="0" y1="0" x2="512" y2="0" stroke="#00f0ff" stroke-width="1" transform="translate(0,8)" />
    <line x1="0" y1="0" x2="512" y2="0" stroke="#00f0ff" stroke-width="1" transform="translate(0,12)" />
    <line x1="0" y1="0" x2="512" y2="0" stroke="#00f0ff" stroke-width="1" transform="translate(0,16)" />
    <line x1="0" y1="0" x2="512" y2="0" stroke="#00f0ff" stroke-width="1" transform="translate(0,20)" />
  </g>

  <!-- Bottom text: "BLACKJACK AGENT" -->
  <text x="256" y="460" font-family="'Courier New', monospace" font-size="22"
        font-weight="bold" fill="#00f0ff" text-anchor="middle" letter-spacing="6"
        filter="url(#glow-cyan)" opacity="0.9">BLACKJACK AGENT</text>
</svg>

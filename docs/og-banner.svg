<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow-c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-m" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff00aa" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-p" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="35%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="card-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30h25M35 30h25M30 0v25M30 35v25" stroke="#00f0ff" stroke-width="0.4" opacity="0.06"/>
      <circle cx="30" cy="30" r="1.5" fill="#00f0ff" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative horizontal lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#ff00aa" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="3" x2="1200" y2="3" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="627" x2="1200" y2="627" stroke="#ff00aa" stroke-width="0.5" opacity="0.3"/>

  <!-- Left decorative vertical line -->
  <line x1="60" y1="40" x2="60" y2="590" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <circle cx="60" cy="40" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="60" cy="590" r="3" fill="#8b5cf6" opacity="0.4"/>

  <!-- === LEFT SIDE: Card + AI Chip === -->

  <!-- Playing Card (Ace of Spades) -->
  <g transform="translate(240, 280) rotate(-6)">
    <rect x="-85" y="-118" width="170" height="236" rx="12"
          fill="#000" opacity="0.3" transform="translate(5,5)"/>
    <rect x="-85" y="-118" width="170" height="236" rx="12"
          fill="url(#card-g)" stroke="#00f0ff" stroke-width="2.5" filter="url(#glow-c)"/>
    <rect x="-73" y="-106" width="146" height="212" rx="8"
          fill="none" stroke="#00f0ff" stroke-width="0.6" opacity="0.25"/>
    <!-- A top-left -->
    <text x="-58" y="-76" font-family="'Courier New',monospace" font-size="32"
          font-weight="bold" fill="#00f0ff">A</text>
    <!-- Spade center -->
    <g transform="translate(0,-6)">
      <path d="M0,-44 C-10,-34 -38,-12 -38,12 C-38,30 -24,42 -10,42 C-3,42 2,40 5,35
               L0,60 L-10,60 C-12,60 -12,64 -10,64 L10,64 C12,64 12,60 10,60
               L0,60 L0,35 C-2,40 3,42 10,42 C24,42 38,30 38,12 C38,-12 10,-34 0,-44Z"
            fill="#ff00aa" filter="url(#glow-m)"/>
      <circle cx="0" cy="10" r="14" fill="none" stroke="#ff00aa" stroke-width="1" opacity="0.4"/>
      <circle cx="0" cy="10" r="7" fill="none" stroke="#ff00aa" stroke-width="0.5" opacity="0.25"/>
    </g>
    <!-- A bottom-right -->
    <text x="34" y="104" font-family="'Courier New',monospace" font-size="32"
          font-weight="bold" fill="#00f0ff" transform="rotate(180,44,92)">A</text>
  </g>

  <!-- Second card (peeking behind) -->
  <g transform="translate(200, 290) rotate(-18)" opacity="0.5">
    <rect x="-75" y="-105" width="150" height="210" rx="11"
          fill="url(#card-g)" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="-63" y="-93" width="126" height="186" rx="7"
          fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
    <!-- Diagonal pattern for card back -->
    <g opacity="0.15">
      <line x1="-60" y1="-80" x2="60" y2="80" stroke="#8b5cf6" stroke-width="0.8"/>
      <line x1="-40" y1="-80" x2="60" y2="40" stroke="#8b5cf6" stroke-width="0.8"/>
      <line x1="-60" y1="-40" x2="40" y2="80" stroke="#8b5cf6" stroke-width="0.8"/>
      <line x1="-20" y1="-80" x2="60" y2="0" stroke="#8b5cf6" stroke-width="0.8"/>
      <line x1="-60" y1="0" x2="20" y2="80" stroke="#8b5cf6" stroke-width="0.8"/>
    </g>
  </g>

  <!-- AI Brain Chip -->
  <g transform="translate(370, 165)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.5" filter="url(#glow-c)"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.35"/>
    <circle cx="0" cy="0" r="20" fill="rgba(0,240,255,0.04)" stroke="#00f0ff" stroke-width="0.8"/>
    <!-- Traces -->
    <line x1="0" y1="-48" x2="0" y2="-64" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="0" x2="64" y2="0" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="48" x2="0" y2="64" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-48" y1="0" x2="-64" y2="0" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="34" y1="-34" x2="46" y2="-46" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="34" y1="34" x2="46" y2="46" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="-34" y1="-34" x2="-46" y2="-46" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="-34" y1="34" x2="-46" y2="46" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <!-- Nodes -->
    <circle cx="0" cy="-64" r="3.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="64" cy="0" r="3.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="0" cy="64" r="3.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="-64" cy="0" r="3.5" fill="#00f0ff" opacity="0.8"/>
    <text x="0" y="7" font-family="'Courier New',monospace" font-size="20"
          font-weight="bold" fill="#00f0ff" text-anchor="middle">AI</text>
  </g>

  <!-- "21" badge -->
  <g transform="translate(155, 420)">
    <rect x="-32" y="-20" width="64" height="40" rx="8"
          fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow-p)"/>
    <text x="0" y="8" font-family="'Courier New',monospace" font-size="28"
          font-weight="bold" fill="#8b5cf6" text-anchor="middle">21</text>
  </g>

  <!-- === RIGHT SIDE: Text Content === -->

  <!-- Title -->
  <text x="580" y="200" font-family="'Courier New',monospace" font-size="52"
        font-weight="bold" fill="#00f0ff" filter="url(#text-glow)"
        letter-spacing="3">BLACKJACK</text>
  <text x="580" y="260" font-family="'Courier New',monospace" font-size="52"
        font-weight="bold" fill="#ff00aa" filter="url(#glow-m)"
        letter-spacing="3">AI AGENT</text>

  <!-- Divider line -->
  <line x1="580" y1="285" x2="880" y2="285" stroke="#8b5cf6" stroke-width="2" opacity="0.6" filter="url(#glow-p)"/>

  <!-- Subtitle -->
  <text x="580" y="325" font-family="'Courier New',monospace" font-size="20"
        fill="#e0e0e0" letter-spacing="2" opacity="0.9">REAL-TIME STRATEGY COACH</text>

  <!-- Feature tags -->
  <!-- Tag: Card Counting -->
  <g transform="translate(580, 370)">
    <rect x="0" y="-16" width="155" height="30" rx="4"
          fill="rgba(0,240,255,0.08)" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <text x="78" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#00f0ff" text-anchor="middle" letter-spacing="1">CARD COUNTING</text>
  </g>
  <!-- Tag: Monte Carlo -->
  <g transform="translate(750, 370)">
    <rect x="0" y="-16" width="145" height="30" rx="4"
          fill="rgba(255,0,170,0.08)" stroke="#ff00aa" stroke-width="1" opacity="0.6"/>
    <text x="72" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#ff00aa" text-anchor="middle" letter-spacing="1">MONTE CARLO</text>
  </g>
  <!-- Tag: Kelly Criterion -->
  <g transform="translate(910, 370)">
    <rect x="0" y="-16" width="160" height="30" rx="4"
          fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
    <text x="80" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#8b5cf6" text-anchor="middle" letter-spacing="1">KELLY CRITERION</text>
  </g>
  <!-- Tag: LLM Reasoning -->
  <g transform="translate(580, 410)">
    <rect x="0" y="-16" width="150" height="30" rx="4"
          fill="rgba(57,255,20,0.08)" stroke="#39ff14" stroke-width="1" opacity="0.6"/>
    <text x="75" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#39ff14" text-anchor="middle" letter-spacing="1">LLM REASONING</text>
  </g>
  <!-- Tag: LangChain -->
  <g transform="translate(745, 410)">
    <rect x="0" y="-16" width="120" height="30" rx="4"
          fill="rgba(255,152,0,0.08)" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
    <text x="60" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#ff9800" text-anchor="middle" letter-spacing="1">LANGCHAIN</text>
  </g>
  <!-- Tag: Analytics -->
  <g transform="translate(880, 410)">
    <rect x="0" y="-16" width="120" height="30" rx="4"
          fill="rgba(0,240,255,0.08)" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <text x="60" y="5" font-family="'Courier New',monospace" font-size="12"
          fill="#00f0ff" text-anchor="middle" letter-spacing="1">ANALYTICS</text>
  </g>

  <!-- Tech stack line -->
  <text x="580" y="490" font-family="'Courier New',monospace" font-size="14"
        fill="#e0e0e0" opacity="0.4" letter-spacing="2">VUE.JS  /  FLASK  /  PYTHON  /  DEEPSEEK R1</text>

  <!-- URL -->
  <text x="580" y="530" font-family="'Courier New',monospace" font-size="16"
        fill="#8b5cf6" opacity="0.7" letter-spacing="1" filter="url(#glow-p)"
        >blackjack-agent.onrender.com</text>

  <!-- Decorative corner brackets -->
  <!-- Top-left -->
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <!-- Top-right -->
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <!-- Bottom-left -->
  <path d="M20,610 L20,580 M20,610 L50,610" stroke="#ff00aa" stroke-width="2" opacity="0.5"/>
  <!-- Bottom-right -->
  <path d="M1180,610 L1180,580 M1180,610 L1150,610" stroke="#ff00aa" stroke-width="2" opacity="0.5"/>
</svg>

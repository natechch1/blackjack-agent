# 详细训练配置文件
# Training Configuration for Blackjack AI Agent

# 基础训练设置
training:
  # 训练轮数设置
  episodes: 5000          # 总训练手数 (小规模测试)
  optimization_rounds: 5   # 优化轮数 (小规模测试)
  batch_size: 1000        # 每批次手数
  
  # 并行处理 (针对 M4 Pro 优化)
  parallel_processes: 8    # 并行进程数
  use_multiprocessing: true
  
  # 学习参数
  learning_rate: 0.005    # 学习率 (较小值更稳定)
  epsilon_greedy: 0.15    # 探索率 (15% 随机探索)
  decay_rate: 0.995       # 探索率衰减
  min_epsilon: 0.05       # 最小探索率
  
  # 阈值搜索设置
  threshold_grid:
    min_value: -2.0       # 最小阈值
    max_value: 2.0        # 最大阈值
    step_size: 0.1        # 搜索步长
  
  # 收敛条件
  convergence:
    min_improvement: 0.001  # 最小改进阈值
    patience: 5             # 提前停止耐心值
    max_stagnation: 10      # 最大停滞轮数

# 训练场景定义
scenarios:
  # 硬牌决策场景
  hard_hands:
    - total: 16
      dealer_upcards: [7, 8, 9, 10, 11]
      true_count_ranges: [[-5, -1], [-1, 1], [1, 3], [3, 6]]
      thresholds: ["hit_stand", "double_threshold"]
    
    - total: 15
      dealer_upcards: [10, 11]
      true_count_ranges: [[-3, 0], [0, 2], [2, 5]]
      thresholds: ["surrender_threshold", "hit_stand"]
    
    - total: 12
      dealer_upcards: [2, 3, 4, 5, 6]
      true_count_ranges: [[-2, 0], [0, 2], [2, 4]]
      thresholds: ["hit_stand"]

  # 软牌决策场景
  soft_hands:
    - total: 18
      dealer_upcards: [9, 10, 11]
      true_count_ranges: [[-2, 1], [1, 3], [3, 5]]
      thresholds: ["hit_stand", "double_threshold"]
    
    - total: 17
      dealer_upcards: [2, 7, 8]
      true_count_ranges: [[-1, 1], [1, 3]]
      thresholds: ["double_threshold"]

  # 对子分牌场景
  pairs:
    - pair_rank: "8"
      dealer_upcards: [10, 11]
      true_count_ranges: [[-2, 0], [0, 2]]
      thresholds: ["split_threshold"]
    
    - pair_rank: "9"
      dealer_upcards: [7, 10, 11]
      true_count_ranges: [[-1, 1], [1, 3]]
      thresholds: ["split_threshold"]

# 投注策略训练
betting:
  # Kelly 准则参数优化
  kelly_optimization:
    enabled: true
    fraction_range: [0.1, 0.5]  # Kelly 分数范围
    risk_levels: ["conservative", "moderate", "aggressive"]
  
  # 真实计数投注相关性
  true_count_betting:
    base_multipliers: [1, 2, 4, 8, 12, 16]  # 基础倍数
    count_thresholds: [1, 2, 3, 4, 5]       # 计数阈值

# 模型保存设置
model_saving:
  # 自动保存
  auto_save: true
  save_frequency: 10000   # 每10k手自动保存
  
  # 保存路径
  base_path: "models/trained_agents"
  
  # 保存内容
  save_components:
    - "decision_thresholds"   # 决策阈值
    - "betting_strategy"      # 投注策略
    - "overrides"            # 策略覆盖
    - "training_history"     # 训练历史
    - "performance_metrics"  # 性能指标
  
  # 版本控制
  versioning:
    enabled: true
    max_versions: 10        # 保留最新10个版本
    naming_pattern: "agent_v{version}_{timestamp}"

# 性能评估
evaluation:
  # 测试集设置
  test_episodes: 50000     # 测试手数
  validation_frequency: 5  # 每5轮验证一次
  
  # 基准对比
  benchmarks:
    - "basic_strategy_only"
    - "basic_strategy_with_counting"
    - "previous_best_agent"
  
  # 评估指标
  metrics:
    - "expected_value"      # 期望值
    - "win_rate"           # 胜率
    - "profit_per_hand"    # 每手利润
    - "sharpe_ratio"       # 夏普比率
    - "max_drawdown"       # 最大回撤
    - "volatility"         # 波动率

# 训练监控
monitoring:
  # 实时监控
  live_monitoring: true
  update_frequency: 1000   # 每1000手更新
  
  # 指标跟踪
  tracked_metrics:
    - "running_profit"
    - "current_episode"
    - "convergence_status"
    - "best_ev_so_far"
    - "threshold_updates"
  
  # 可视化
  visualization:
    enabled: true
    plot_types: ["profit_curve", "ev_improvement", "threshold_evolution"]
    
  # 日志输出
  logging:
    console_level: "INFO"
    file_level: "DEBUG"
    progress_bar: true

# 高级设置
advanced:
  # 温度调整 (模拟退火)
  temperature_schedule:
    enabled: true
    initial_temp: 1.0
    final_temp: 0.1
    decay_type: "exponential"  # linear, exponential
  
  # 正则化
  regularization:
    l1_penalty: 0.001         # L1正则化
    l2_penalty: 0.001         # L2正则化
    
  # 早停策略
  early_stopping:
    enabled: true
    patience: 15              # 连续15轮无改进则停止
    min_delta: 0.0001        # 最小改进量
  
  # 内存管理
  memory:
    max_history_length: 1000000  # 最大历史长度
    cleanup_frequency: 10000     # 清理频率

# 导出设置
export:
  # 策略导出
  strategy_export:
    format: ["json", "pickle", "yaml"]
    include_metadata: true
    
  # 报告生成
  reports:
    generate_html_report: true
    include_charts: true
    include_analysis: true
    
  # 部署准备
  deployment:
    create_config_file: true
    package_dependencies: false
    generate_readme: true
